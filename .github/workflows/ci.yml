name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel superseded runs on the same branch so a fast-follow push doesn't queue.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install 'ruff>=0.5'

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

  typecheck:
    name: mypy (core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install with dev extras
        run: pip install -e '.[dev]'

      - name: mypy on core
        run: mypy src/cyberm4fia_wifi/core

  tests:
    name: pytest (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      # scapy's link-layer features want libpcap on Linux; for our tests we
      # only build packets in-process, but installing libpcap-dev keeps
      # import-time warnings quiet and matches what an operator would have.
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpcap-dev

      - name: Install with dev extras
        run: pip install -e '.[dev]'

      - name: pytest with coverage
        run: pytest --cov=src/cyberm4fia_wifi --cov-report=xml --cov-report=term -q

      - name: Upload coverage XML
        if: always() && matrix.python == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
